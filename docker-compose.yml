version: "3.9"

services:
  gateway:
    build: ./server/getway
    ports:
      - "9000:9000"
    env_file:
      - ./server/.env

  auth:
    build: ./server/auth-service
    ports:
      - "4000:4000"
    env_file:
      - ./server/.env

  booking:
    build: ./server/booking-service
    ports:
      - "5000:5000"
    env_file:
      - ./server/.env

  payment:
    build: ./server/payment
    ports:
      - "7000:7000"
    env_file:
      - ./server/.env

  notification:
    build: ./server/notification
    ports:
      - "8000:8000"
    env_file:
      - ./server/.env

  movie:
    build: ./server/Movie
    ports:
      - "6000:6000"
    env_file:
      - ./server/.env

  client:
    build: ./client
    ports:
      - "80:80"