services:
  gateway:
    build: ./server/getway
    expose:
      - "9000"
    env_file:
      - ./server/.env

  auth:
    build: ./server/auth-service
    expose:
      - "4000"
    env_file:
      - ./server/.env

  booking:
    build: ./server/booking-service
    expose:
      - "5000"
    env_file:
      - ./server/.env

  payment:
    build: ./server/payment
    expose:
      - "7000"
    env_file:
      - ./server/.env

  notification:
    build: ./server/notification
    expose:
      - "8000"
    env_file:
      - ./server/.env

  movie:
    build: ./server/Movie
    expose:
      - "6000"
    env_file:
      - ./server/.env

  client:
    build: ./client
    expose:
      - "80"

  nginx:
    image: nginx:alpine
    container_name: moviebookinghub-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - client
      - gateway